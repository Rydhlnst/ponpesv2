        - generic [ref=e82]:
          - generic [ref=e83]:
            - heading "Sejarah Singkat Pondok Pesantren Al-Anshor Liang" [level=2] [ref=e84]
            - paragraph [ref=e85]: Pondok ini lahir dari kebutuhan nyata masyarakat Maluku untuk menghadirkan pendidikan, pengasuhan, dan pembinaan Islam bagi anak-anak yang membutuhkan.
            - link "Lihat lokasi di Google Maps" [ref=e86] [cursor=pointer]:
              - /url: https://maps.app.goo.gl/9ZxeKutNHJodArJV6
          - generic [ref=e87]:
            - paragraph [ref=e88]: Pondok Pesantren Al-Anshor berawal dari keprihatinan terhadap konflik sosial bernuansa SARA yang melanda Maluku pada tahun 1999-2004. Konflik tersebut meninggalkan dampak yang sangat besar, terutama bagi anak-anak yang kehilangan orang tua, berasal dari keluarga korban konflik, mengalami putus sekolah, berasal dari suku terasing, serta keluarga kurang mampu.
            - paragraph [ref=e89]: Berangkat dari kondisi tersebut, Ust. Abu Imam Abdu Rohim Rumbara, M.H. bersama para aktivis dakwah dan sosial mendirikan Pondok Pesantren Al-Anshor pada 14 Februari 2004 sebagai lembaga pendidikan yang juga berfungsi sebagai panti asuhan. Tujuan utamanya adalah mengasuh, membina, dan menyekolahkan anak-anak yang membutuhkan, sekaligus menanamkan nilai-nilai Islam yang benar agar mereka tumbuh menjadi pribadi yang berakhlak mulia, mandiri, dan bermanfaat bagi masyarakat.
            - paragraph [ref=e90]: Seiring dengan perkembangan jumlah santri, pada Agustus 2015 didirikan Pondok Pesantren Al-Anshor Liang sebagai cabang ketiga Pondok Pesantren Al-Anshor di Maluku. Pendirian pondok ini bertujuan untuk memisahkan tempat pembinaan santri putra (ikhwan) dan santri putri (akhwat), yang sebelumnya berada dalam satu lingkungan di Pondok Pesantren Al-Anshor Ambon. Dengan berdirinya Pondok Pesantren Al-Anshor Liang, proses pendidikan dan pembinaan santri dapat berlangsung lebih optimal sesuai dengan prinsip-prinsip pendidikan Islam.
            - paragraph [ref=e91]: Hingga saat ini, Pondok Pesantren Al-Anshor terus berkembang dan memperoleh kepercayaan serta dukungan yang luas dari masyarakat.
